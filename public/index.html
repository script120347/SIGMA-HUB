                            <section><h2>Weekly Academic Coaching</h2><p>A standing weekly hour for students who need a dependable anchor in the schedule. Sessions blend planner check-ins, current homework, and quiet executive function coaching. Students leave with a clear plan for the week ahead, reducing missing assignments and last-minute scrambles. Designed for grades six through twelve and recalibrated at the start of each term.</p></section>
                            <section><h2>Subject-Focused Tutoring</h2><p>Targeted lessons in a single subject for students with a specific class to shore up. Pre-algebra and Algebra I or II build fluency with expressions, graphing, and word problems. Geometry and precalculus revisit measurement, transformations, and functions. Science work draws on lab notes, models, and weekly quiz preparation across biology and chemistry. Writing support builds essay structure, evidence, and revision rhythm.</p></section>
                            <section><h2>Standardized Test Preparation</h2><p>A structured ten to fourteen week arc for the ACT or SAT. Students start with a full diagnostic, move into targeted drills in the weakest sections, and complete four proctored-style practice exams with section review between each one. Score growth is tracked monthly and shared with parents in plain language. AP exam preparation follows the same shape, condensed around the subject calendar.</p></section>
                            <section><h2>How We Begin</h2><p>Every family starts with a free twenty-minute intake call. We talk through current classes, schedule, recent report cards, and any accommodations such as IEP or 504 plans. From there, we match a tutor by subject, grade level, and learning style, with a no-cost rematch in the first three sessions if the fit is not right. First lessons usually happen within the same week as the intake conversation.</p></section>
                            <section><h2>Families and Outcomes</h2><p>Parents receive a short written recap after every block of sessions. Each recap names the goal, the win, the sticking point, and the next focus area in plain English. Families notice steadier homework routines, fewer Sunday-evening arguments, and clearer self-advocacy at school. Across completed prep arcs the average score growth is five point four points on the ACT and one hundred eighty points on the SAT.</p></section>

                <button id="loginBtn">Login</button>
                <div class="switch">No account? <a id="showRegister">Register →</a></div>
            </div>
            <div id="registerBox" class="hidden">
                <div class="error" id="regError"></div>
                <input type="text" id="regUser" placeholder="Username">
                <input type="password" id="regPass" placeholder="Password">
                <button id="registerBtn">Register</button>
                <div class="switch">Have an account? <a id="showLogin">← Login</a></div>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app" class="living-border">
        <div id="header">
            <div class="left">
                <div id="spinning-logo">
                    <img src="https://i.ibb.co/HDnCTHWJ/tcc.png" alt="Logo" style="width:100%; height:100%; object-fit:contain;">
                </div>
                <div class="logo">Σ<span>HUB</span> Chat</div>
            </div>
            <div id="header-right">
                <span><span class="status-dot"></span><span class="user-badge" id="chatUserDisplay">User</span></span>
                <button id="adminToggle">👑 Admin</button>
                <button id="logoutBtn" style="background:transparent; border:none; color:#6a4a8a; cursor:pointer; font-size:10px; padding:2px 8px; border-radius:4px;">Logout</button>
            </div>
        </div>
        <div id="main">
            <div id="chat-container">
                <div id="messages">
                    <div class="msg"><span class="user">System</span><span class="time">now</span><div class="text">Welcome to Sigma Hub Chat!</div></div>
                </div>
                <div class="input-area">
                    <input type="text" id="msgInput" placeholder="Type your message...">
                    <button id="sendBtn">Send</button>
                    <button id="pmBtn" style="padding:8px 12px; border-radius:30px; border:2px solid rgba(122,58,170,0.2); background:#150025; color:#d4b0ff; cursor:pointer; font-weight:700; flex-shrink:0; font-size:11px;">PM</button>
                </div>
                <div id="adminPanel" class="admin-panel">
                    <h4>👑 Admin Panel - Users & Passwords</h4>
                    <div id="userList"></div>
                </div>
            </div>
            <div id="members-sidebar">
                <h3>Members</h3>
                <div id="memberList"></div>
            </div>
        </div>
    </div>

    <!-- SAVED ACCOUNTS -->
    <div id="saved-accounts">
        <span>Saved</span>
        <span class="badge" id="accCount">0</span>
        <div class="list" id="accList"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
    // ============================================================
    // STARS BACKGROUND
    // ============================================================
    (function initStars() {
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let w, h;
        const stars = [];
        const NUM_STARS = 60;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 1.8 + 0.3;
                this.baseOpacity = Math.random() * 0.3 + 0.05;
                this.speed = Math.random() * 0.01 + 0.003;
                this.phase = Math.random() * Math.PI * 2;
                this.drift = (Math.random() - 0.5) * 0.03;
            }
            update() {
                this.phase += this.speed;
                this.x += this.drift + Math.sin(this.phase * 0.3) * 0.008;
                this.y += Math.cos(this.phase * 0.2) * 0.008;
                if (this.x < 0) this.x = w;
                if (this.x > w) this.x = 0;
                if (this.y < 0) this.y = h;
                if (this.y > h) this.y = 0;
            }
            draw() {
                const shine = 0.6 + 0.4 * Math.sin(this.phase);
                const alpha = this.baseOpacity * shine;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * shine, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 176, 255, ${alpha})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < NUM_STARS; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, w, h);
            stars.forEach(star => { star.update(); star.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    })();

    // ============================================================
    // SERVER-SIDE API CALLS
    // ============================================================

    const API_URL = window.location.origin + '/api';

    async function registerUser(username, password) {
        const res = await fetch(`${API_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        return data;
    }

    async function loginUser(username, password) {
        const res = await fetch(`${API_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        return data;
    }

    async function sendMessage(username, text, to = 'public') {
        const res = await fetch(`${API_URL}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, text, to })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Send failed');
        return data;
    }

    async function getMessages() {
        const res = await fetch(`${API_URL}/messages`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load messages');
        return data;
    }

    async function getUsers() {
        const res = await fetch(`${API_URL}/users`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load users');
        return data;
    }

    // ============================================================
    // SESSION MANAGEMENT
    // ============================================================

    const SESSION_KEY = 'sigma_session';

    function getSession() { return localStorage.getItem(SESSION_KEY) || null; }
    function setSession(u) { localStorage.setItem(SESSION_KEY, u); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    // ============================================================
    // DOM ELEMENTS
    // ============================================================

    const loginBox = document.getElementById('loginBox');
    const registerBox = document.getElementById('registerBox');
    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const regUser = document.getElementById('regUser');
    const regPass = document.getElementById('regPass');
    const registerBtn = document.getElementById('registerBtn');
    const regError = document.getElementById('regError');
    const showRegister = document.getElementById('showRegister');
    const showLogin = document.getElementById('showLogin');
    const authOverlay = document.getElementById('auth-overlay');
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const pmBtn = document.getElementById('pmBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const toast = document.getElementById('toast');
    const chatUserDisplay = document.getElementById('chatUserDisplay');
    const memberList = document.getElementById('memberList');
    const revisionFlash = document.getElementById('revisionFlash');
    const app = document.getElementById('app');
    const adminPanel = document.getElementById('adminPanel');
    const userList = document.getElementById('userList');
    const adminToggle = document.getElementById('adminToggle');
    const savedAccs = document.getElementById('saved-accounts');
    const accCount = document.getElementById('accCount');
    const accList = document.getElementById('accList');
    let toastTimeout;
    let currentUser = '';
    let currentPM = null;
    let messageInterval = null;

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============================================================
    // SAVED ACCOUNTS
    // ============================================================

    async function updateSavedAccounts() {
        try {
            const users = await getUsers();
            const names = users || [];
            accCount.textContent = names.length;
            if (names.length === 0) {
                accList.innerHTML = '<div class="acc" style="color:#6a4a8a;">No saved accounts</div>';
                return;
            }
            accList.innerHTML = names.map(u =>
                `<div class="acc">${escapeHtml(u)}</div>`
            ).join('');
        } catch (err) {
            console.error('Failed to load users:', err);
        }
    }

    // ============================================================
    // AUTH - LOGIN / REGISTER
    // ============================================================

    showRegister.onclick = function(e) {
        e.preventDefault();
        loginBox.classList.add('hidden');
        registerBox.classList.remove('hidden');
        registerBox.className = 'slide-switch';
        loginError.textContent = '';
        regError.textContent = '';
        setTimeout(() => { registerBox.className = ''; }, 400);
    };

    showLogin.onclick = function(e) {
        e.preventDefault();
        registerBox.classList.add('hidden');
        loginBox.classList.remove('hidden');
        loginBox.className = 'slide-switch-right';
        loginError.textContent = '';
        regError.textContent = '';
        setTimeout(() => { loginBox.className = ''; }, 400);
    };

    registerBtn.onclick = async function() {
        const user = regUser.value.trim();
        const pass = regPass.value.trim();
        regError.textContent = '';
        if (!user || !pass) { regError.textContent = 'Fill all fields'; return; }
        if (user.length < 2) { regError.textContent = 'Min 2 chars'; return; }
        if (pass.length < 4) { regError.textContent = 'Min 4 chars'; return; }
        try {
            await registerUser(user, pass);
            regError.textContent = '';
            showToast('Account created! Login now.');
            registerBox.classList.add('hidden');
            loginBox.classList.remove('hidden');
            loginBox.className = 'slide-switch-right';
            loginUser.value = user;
            loginPass.value = '';
            setTimeout(() => { loginBox.className = ''; }, 400);
            updateSavedAccounts();
        } catch (err) {
            regError.textContent = '❌ ' + err.message;
        }
    };

    loginBtn.onclick = async function() {
        const user = loginUser.value.trim();
        const pass = loginPass.value.trim();
        loginError.textContent = '';
        if (!user || !pass) { loginError.textContent = 'Fill all fields'; return; }
        if (getSession()) { showToast('Already logged in'); return; }
        try {
            await loginUser(user, pass);
            setSession(user);
            loginError.textContent = '';
            authOverlay.classList.add('hidden');
            showToast('Welcome, ' + user);
            enterChat(user);
        } catch (err) {
            loginError.textContent = '❌ ' + err.message;
        }
    };

    loginPass.onkeydown = function(e) { if (e.key === 'Enter') loginBtn.click(); };
    regPass.onkeydown = function(e) { if (e.key === 'Enter') registerBtn.click(); };
    msgInput.onkeydown = function(e) { if (e.key === 'Enter') sendBtn.click(); };

    // ============================================================
    // CHAT
    // ============================================================

    function isAdmin(username) { return username === 'admin'; }

    async function renderMessages() {
        try {
            const allMsgs = await getMessages();
            let msgs = allMsgs;
            if (currentPM) {
                msgs = allMsgs.filter(m =>
                    (m.user === currentUser && m.to === currentPM) ||
                    (m.user === currentPM && m.to === currentUser)
                );
            } else {
                msgs = allMsgs.filter(m => !m.to || m.to === 'public');
            }
            if (msgs.length === 0) {
                messagesDiv.innerHTML = `<div class="msg"><span class="user">System</span><span class="time">now</span><div class="text">${currentPM ? 'Private chat with ' + currentPM : 'No messages yet.'}</div></div>`;
                return;
            }
            messagesDiv.innerHTML = msgs.map(m =>
                `<div class="msg">
                    <span class="user">${escapeHtml(m.user)}${m.to && m.to !== 'public' ? ' ➜ ' + escapeHtml(m.to) : ''}</span>
                    <span class="time">${escapeHtml(m.time)}</span>
                    <div class="text">${escapeHtml(m.text)}</div>
                </div>`
            ).join('');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        } catch (err) {
            console.error('Render error:', err);
        }
    }

    async function renderMembers() {
        try {
            const users = await getUsers();
            const allUsers = users || [];
            if (allUsers.length === 0) {
                memberList.innerHTML = '<div style="color:#6a4a8a; font-size:10px;">No users</div>';
                return;
            }
            memberList.innerHTML = allUsers.map(u => {
                const isMe = u === currentUser;
                return `<div class="member-item">
                    <span class="name ${isMe ? 'me' : ''}">${escapeHtml(u)}${isMe ? ' (you)' : ''}</span>
                    <div class="actions">
                        ${isMe ? '' : `<button class="pm" onclick="startPM('${escapeHtml(u)}')">💬</button>`}
                    </div>
                </div>`;
            }).join('');
            // Admin panel - show users
            if (isAdmin(currentUser)) {
                adminPanel.classList.add('show');
                const entries = allUsers.map(u => ({ username: u }));
                userList.innerHTML = entries.length === 0 ? '<div style="color:#6a4a8a; font-size:10px;">No users</div>' :
                    entries.map(({ username }) => `<div class="user-row"><span>${escapeHtml(username)}</span></div>`).join('');
            } else {
                adminPanel.classList.remove('show');
            }
        } catch (err) {
            console.error('Render members error:', err);
        }
    }

    function startPM(username) {
        if (username === currentUser) { showToast('Cannot PM yourself'); return; }
        currentPM = username;
        pmBtn.textContent = 'PM: ' + username;
        pmBtn.style.borderColor = '#a070d0';
        renderMessages();
        showToast('Private chat with ' + username);
    }

    pmBtn.onclick = function() {
        if (currentPM) {
            currentPM = null;
            pmBtn.textContent = 'PM';
            pmBtn.style.borderColor = 'rgba(122,58,170,0.2)';
            renderMessages();
            showToast('Back to public');
        } else {
            showToast('Click a member\'s 💬 to PM');
        }
    };

    async function sendMessageHandler() {
        const text = msgInput.value.trim();
        if (!text || !currentUser) return;
        try {
            await sendMessage(currentUser, text, currentPM || 'public');
            msgInput.value = '';
            await renderMessages();
        } catch (err) {
            showToast('❌ ' + err.message);
        }
    }

    sendBtn.onclick = sendMessageHandler;

    logoutBtn.onclick = function() {
        if (confirm('Logout?')) {
            clearSession();
            currentUser = '';
            currentPM = null;
            if (messageInterval) clearInterval(messageInterval);
            authOverlay.classList.remove('hidden');
            showToast('Logged out');
        }
    };

    adminToggle.onclick = function() {
        if (isAdmin(currentUser)) {
            adminPanel.classList.toggle('show');
        } else {
            showToast('Admin only');
        }
    };

    function enterChat(username) {
        currentUser = username;
        chatUserDisplay.textContent = username;
        renderMessages();
        renderMembers();
        updateSavedAccounts();
        if (messageInterval) clearInterval(messageInterval);
        messageInterval = setInterval(async () => {
            await renderMessages();
            await renderMembers();
        }, 3000);
    }

    // ============================================================
    // SESSION CHECK
    // ============================================================

    (function() {
        const session = getSession();
        if (session) {
            authOverlay.classList.add('hidden');
            showToast('Welcome back, ' + session);
            enterChat(session);
            return;
        }
        authOverlay.classList.remove('hidden');
    })();

    // ============================================================
    // INIT
    // ============================================================

    updateSavedAccounts();
    console.log('🔥 Sigma Hub Chat ready (server-side).');
    </script>
</body>
</html>
