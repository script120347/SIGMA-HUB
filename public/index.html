<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma Hub Chat</title>
    <!-- FAKE REVISION PAGE (first) -->
    <style>
        /* --- REVISION FLASH --- */
        #revisionFlash {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #0a0015;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.8s ease;
        }
        #revisionFlash.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #revisionFlash svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* --- MAIN APP --- */
        #app {
            display: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #app.show {
            display: flex;
            opacity: 1;
        }
        /* --- REST OF STYLES --- */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0015;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #d4b0ff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #auth-box {
            background: rgba(21,0,37,0.8);
            border: 2px solid #7a3aaa;
            border-radius: 24px;
            padding: 40px 50px;
            width: 360px;
            max-width: 90vw;
            box-shadow: 0 0 60px rgba(160,112,208,0.1);
        }
        #auth-box h2 { text-align: center; color: #d4b0ff; margin-bottom: 20px; font-size: 26px; letter-spacing: 2px; }
        #auth-box h2 span { color: #a070d0; }
        #auth-box input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 2px solid rgba(122,58,170,0.3);
            background: rgba(10,0,21,0.5); color: #d4b0ff; font-size: 14px;
            outline: none; margin-bottom: 12px;
        }
        #auth-box input:focus { border-color: #a070d0; }
        #auth-box input::placeholder { color: #6a4a8a; }
        #auth-box button {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 2px solid rgba(122,58,170,0.3);
            background: #150025; color: #d4b0ff; font-weight: 700;
            font-size: 16px; cursor: pointer; transition: 0.15s; margin-bottom: 8px;
        }
        #auth-box button:hover { background: #1f0035; border-color: #a070d0; }
        #auth-box .switch { text-align: center; margin-top: 10px; font-size: 13px; color: #6a4a8a; }
        #auth-box .switch a { color: #a070d0; cursor: pointer; font-weight: 600; }
        #auth-box .error { color: #ff6b8a; font-size: 13px; text-align: center; min-height: 20px; }
        .hidden { display: none !important; }

        /* CHAT */
        #chat {
            display: none;
            position: fixed;
            inset: 20px;
            background: rgba(10,0,21,0.8);
            backdrop-filter: blur(20px);
            border: 2px solid #7a3aaa;
            border-radius: 28px;
            padding: 20px;
            flex-direction: column;
        }
        #chat.show { display: flex; }
        #chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        #chat-header h2 { color: #d4b0ff; font-size: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        #chat-header h2 span { color: #a070d0; }
        #chat-header .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        #chat-header .user-badge { color: #a070d0; font-weight: 600; font-size: 14px; }
        #chat-header #logoutBtn {
            background: transparent; border: none; color: #6a4a8a;
            cursor: pointer; font-size: 12px; padding: 4px 10px; border-radius: 6px;
        }
        #chat-header #logoutBtn:hover { color: #ff6b8a; background: rgba(255,107,138,0.05); }

        /* NOTIFICATION BUTTON */
        #notifBtn {
            background: transparent;
            border: 1px solid rgba(122,58,170,0.3);
            color: #6a4a8a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.15s;
        }
        #notifBtn:hover { border-color: #a070d0; color: #a070d0; }
        #notifBtn.on { border-color: #7ac39b; color: #7ac39b; }

        /* BIGGER SPINNING LOGO */
        #spinning-logo {
            width: 48px;
            height: 48px;
            animation: spinLogo 4s linear infinite;
            cursor: pointer;
            filter: drop-shadow(0 0 20px rgba(160,112,208,0.3));
            flex-shrink: 0;
            display: inline-block;
        }
        @keyframes spinLogo {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        #spinning-logo img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
        }

        #chat-body { display: flex; flex: 1; overflow: hidden; gap: 16px; }

        #members-sidebar {
            width: 180px;
            background: rgba(10,0,21,0.3);
            border-radius: 16px;
            padding: 12px;
            overflow-y: auto;
            flex-shrink: 0;
            border: 1px solid rgba(122,58,170,0.08);
        }
        #members-sidebar h3 {
            color: #6a4a8a; font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 10px;
            border-bottom: 1px solid rgba(58,26,90,0.2); padding-bottom: 6px;
        }
        .member-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 8px; border-radius: 8px; margin: 2px 0;
            font-size: 13px; transition: 0.15s; cursor: default;
        }
        .member-item:hover { background: rgba(160,112,208,0.06); }
        .member-item .name.me { color: #7ac39b; }
        .member-item .name.admin { color: #a070d0; font-weight: 700; }
        .member-item .actions {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .member-item .actions button {
            background: transparent; border: none; color: #6a4a8a;
            cursor: pointer; font-size: 10px; padding: 2px 5px; border-radius: 4px;
            transition: 0.15s;
            white-space: nowrap;
        }
        .member-item .actions button.pm:hover { color: #7ac39b; }
        .member-item .actions button.kick:hover { color: #ff6b8a; }
        .member-item .actions button.delete:hover { color: #ff3333; }
        .member-item .actions button.clear:hover { color: #ffaa00; }

        #messages-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #messages-container .chat-target {
            color: #6a4a8a; font-size: 12px; margin-bottom: 6px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        #messages-container .chat-target span { color: #a070d0; font-weight: 600; }
        #messages-container .chat-target .back-btn {
            background: transparent; border: 1px solid rgba(122,58,170,0.2);
            color: #6a4a8a; padding: 2px 12px; border-radius: 12px;
            font-size: 11px; cursor: pointer; transition: 0.15s; display: none;
        }
        #messages-container .chat-target .back-btn:hover { border-color: #a070d0; color: #a070d0; }
        #messages-container .chat-target .back-btn.show { display: inline-block; }
        #messages {
            flex: 1; overflow-y: auto; background: rgba(10,0,21,0.3);
            border-radius: 16px; padding: 12px;
            border: 1px solid rgba(122,58,170,0.08); margin-bottom: 10px;
        }
        #messages .msg {
            padding: 6px 12px; margin: 4px 0; border-radius: 10px;
            background: rgba(21,0,37,0.4); border: 1px solid rgba(58,26,90,0.15);
            word-wrap: break-word;
        }
        #messages .msg .user { color: #a070d0; font-weight: 700; }
        #messages .msg .time { color: #6a4a8a; font-size: 0.6rem; margin-left: 8px; }
        #messages .msg .text { margin-top: 2px; color: #e0d0f0; word-wrap: break-word; }
        #messages .msg.dm {
            border-color: rgba(160,112,208,0.3);
            background: rgba(21,0,37,0.6);
        }
        #messages .msg.dm .user { color: #7ac39b; }

        .input-area { display: flex; gap: 8px; flex-shrink: 0; }
        .input-area input {
            flex: 1; padding: 10px 16px; border-radius: 30px;
            border: 2px solid rgba(122,58,170,0.2);
            background: rgba(10,0,21,0.4); color: #d4b0ff; outline: none;
        }
        .input-area input:focus { border-color: #a070d0; }
        .input-area button {
            padding: 10px 20px; border-radius: 30px;
            border: 2px solid rgba(122,58,170,0.2);
            background: #150025; color: #d4b0ff; font-weight: 700;
            cursor: pointer; transition: 0.15s; flex-shrink: 0;
        }
        .input-area button:hover { background: #1f0035; border-color: #a070d0; }

        /* CLEAR CHAT BUTTON (admin only) */
        #clearChatBtn {
            display: none;
            background: transparent;
            border: 1px solid rgba(255,170,0,0.3);
            color: #ffaa00;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.15s;
        }
        #clearChatBtn:hover {
            border-color: #ffaa00;
            background: rgba(255,170,0,0.1);
        }
        #clearChatBtn.show {
            display: inline-block;
        }

        /* TOAST NOTIFICATION (fallback) */
        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(21,0,37,0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #7a3aaa;
            padding: 14px 20px;
            border-radius: 16px;
            color: #d4b0ff;
            font-size: 14px;
            opacity: 0;
            transform: translateX(50px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 999;
            max-width: 350px;
            box-shadow: 0 0 60px rgba(160,112,208,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
        .toast .toast-user { color: #7ac39b; font-weight: 700; font-size: 15px; }
        .toast .toast-text { color: #e0d0f0; font-size: 14px; }
        .toast .toast-icon { font-size: 24px; }

        /* NOTIFICATION DOT ON MEMBER */
        .notif-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff6b8a;
            border-radius: 50%;
            margin-left: 4px;
            animation: pulseNotif 1s infinite;
            box-shadow: 0 0 15px rgba(255,107,138,0.4);
        }
        @keyframes pulseNotif {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* UNREAD BADGE ON CHAT HEADER */
        #unreadBadge {
            display: none;
            background: #ff6b8a;
            color: #0a0015;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            animation: pulseNotif 1s infinite;
        }
        #unreadBadge.show { display: inline-block; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(10,0,21,0.2); }
        ::-webkit-scrollbar-thumb { background: #7a3aaa; border-radius: 10px; }

        @media (max-width: 600px) {
            #auth-box { padding: 30px 25px; }
            #chat-body { flex-direction: column; }
            #members-sidebar {
                width: 100%;
                max-height: 120px;
                border-left: none;
                border-bottom: 1px solid rgba(122,58,170,0.08);
            }
            #chat { inset: 10px; padding: 12px; }
            #spinning-logo { width: 40px; height: 40px; }
            .toast { right: 10px; left: 10px; max-width: none; bottom: 70px; }
            #chat-header h2 { font-size: 16px; gap: 8px; }
            #notifBtn { font-size: 9px; padding: 2px 8px; }
            #clearChatBtn { font-size: 9px; padding: 2px 8px; }
        }
    </style>
</head>

    <script>
    // ============================================================
    // SERVER-SIDE CHAT – WORKS ACROSS ALL DEVICES
    // ============================================================

    var API_URL = window.location.origin + '/api';
    var SESSION_KEY = 'sigma_session';

    function getSession() { return localStorage.getItem(SESSION_KEY) || null; }
    function setSession(u) { localStorage.setItem(SESSION_KEY, u); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    // ---- API CALLS ----
    function registerUser(username, password) {
        return fetch(API_URL + '/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.error) throw new Error(d.error);
            return d;
        });
    }

    function loginUser(username, password) {
        return fetch(API_URL + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.error) throw new Error(d.error);
            return d;
        });
    }

    function sendMessage(username, text, to) {
        return fetch(API_URL + '/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, text, to: to || 'public' })
        }).then(function(r) { return r.json(); }).then(function(d) {
            if (d.error) throw new Error(d.error);
            return d;
        });
    }

    function getMessages() {
        return fetch(API_URL + '/messages').then(function(r) { return r.json(); });
    }

    function getUsers() {
        return fetch(API_URL + '/users').then(function(r) { return r.json(); });
    }

    function deleteUser(username) {
        return fetch(API_URL + '/admin/users/' + username, { method: 'DELETE' })
            .then(function(r) { return r.json(); }).then(function(d) {
                if (d.error) throw new Error(d.error);
                return d;
            });
    }

    function kickUser(username) {
        return fetch(API_URL + '/admin/kick/' + username, { method: 'DELETE' })
            .then(function(r) { return r.json(); }).then(function(d) {
                if (d.error) throw new Error(d.error);
                return d;
            });
    }

    function clearChat() {
        return fetch(API_URL + '/admin/clear', { method: 'DELETE' })
            .then(function(r) { return r.json(); }).then(function(d) {
                if (d.error) throw new Error(d.error);
                return d;
            });
    }

    // ============================================================
    // CHROME NOTIFICATIONS + FALLBACK
    // ============================================================

    var notifPermission = false;

            alert('This browser does not support desktop notifications.');
            return;
        }
        if (Notification.permission === 'granted') {
            notifPermission = true;
            document.getElementById('notifBtn').textContent = '🔔 On';
            document.getElementById('notifBtn').classList.add('on');
            showToastPopup('🔔', 'Notifications enabled!');
            return;
        }
        if (Notification.permission === 'denied') {
            alert('Notifications are blocked. Please enable them in your browser settings.');
            return;
        }
        Notification.requestPermission().then(function(perm) {
            if (perm === 'granted') {
                notifPermission = true;
                document.getElementById('notifBtn').textContent = '🔔 On';
                document.getElementById('notifBtn').classList.add('on');
                showToastPopup('🔔', 'Notifications enabled!');
                new Notification('Sigma Hub Chat', {
                    body: 'Notifications are now active!',
                    icon: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5MiIgaGVpZ2h0PSI5MiIgdmlld0JveD0iMCAwIDkyIDkyIj48cGF0aCBkPSJNNDYgMTBjLTE5LjkgMC0zNiAxNi4xLTM2IDM2czE2LjEgMzYgMzYgMzZjMTkuOSAwIDM2LTE2LjEgMzYtMzZTNjUuOSAxMCA0NiAxMHptMCA2NGMtMTUuNSAwLTI4LTEyLjUtMjgtMjhzMTIuNS0yOCAyOC0yOCAyOCAxMi41IDI4IDI4LTEyLjUgMjgtMjggMjh6bTAtNDhjLTEwLjUgMC0xOSA4LjUtMTkgMTlzOC41IDE5IDE5IDE5IDE5LTguNSAxOS0xOS04LjUtMTktMTktMTl6bTAgMzBjLTYuMSAwLTExLTQuOS0xMS0xMXM0LjktMTEgMTEtMTEgMTEgNC45IDExIDExLTQuOSAxMS0xMSAxMXoiIGZpbGw9IiNkNGIwZmYiLz48L3N2Zz4='

            } else {
                showToastPopup('🚫', 'Notifications blocked. You can enable them later.');

    }

    function showNotification(user, text) {
        showToastPopup(user, text);
        if (notifPermission && 'Notification' in window && Notification.permission === 'granted') {

                });
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } catch (e) {}
        }
    }

    function showToastPopup(user, text) {
        var toast = document.getElementById('toast');
        var toastUser = document.getElementById('toastUser');
        var toastText = document.getElementById('toastText');
        toastUser.textContent = user;
        toastText.textContent = text;
        toast.classList.add('show');
        clearTimeout(window.toastTimeout);
        window.toastTimeout = setTimeout(function() {
            toast.classList.remove('show');
        }, 4000);
    }

    document.addEventListener('DOMContentLoaded', function() {
        var notifBtn = document.getElementById('notifBtn');
        if (notifBtn) {
            notifBtn.onclick = requestNotificationPermission;
            if ('Notification' in window && Notification.permission === 'granted') {
                notifPermission = true;
                notifBtn.textContent = '🔔 On';
                notifBtn.classList.add('on');
            }
        }
    });

    // ============================================================
    // FAKE REVISION → FADE TO APP
    // ============================================================
    setTimeout(function() {
        var flash = document.getElementById('revisionFlash');
        var app = document.getElementById('app');
        if (flash) flash.classList.add('hidden');
        if (app) {
            app.style.display = 'flex';
            setTimeout(function() {
                app.classList.add('show');
            }, 100);
        }
    }, 2000);

    // ============================================================
    // CHAT APP
    // ============================================================

    // ---- DOM ----
    var loginBox = document.getElementById('loginBox');
    var registerBox = document.getElementById('registerBox');
    var loginUser = document.getElementById('loginUser');
    var loginPass = document.getElementById('loginPass');
    var loginBtn = document.getElementById('loginBtn');
    var loginError = document.getElementById('loginError');
    var regUser = document.getElementById('regUser');
    var regPass = document.getElementById('regPass');
    var registerBtn = document.getElementById('registerBtn');
    var showRegister = document.getElementById('showRegister');
    var showLogin = document.getElementById('showLogin');
    var authBox = document.getElementById('auth-box');
    var chatDiv = document.getElementById('chat');
    var messagesDiv = document.getElementById('messages');
    var msgInput = document.getElementById('msgInput');
    var sendBtn = document.getElementById('sendBtn');
    var logoutBtn = document.getElementById('logoutBtn');
    var chatUserDisplay = document.getElementById('chatUserDisplay');
    var memberList = document.getElementById('memberList');
    var chatTargetLabel = document.getElementById('chatTargetLabel');
    var backToPublicBtn = document.getElementById('backToPublicBtn');
    var unreadBadge = document.getElementById('unreadBadge');
    var clearChatBtn = document.getElementById('clearChatBtn');
    var currentUser = '';
    var currentDM = null;
    var messageInterval = null;

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ---- Auth ----
    showRegister.onclick = function(e) {
        e.preventDefault();
        loginBox.classList.add('hidden');
        registerBox.classList.remove('hidden');
        loginError.textContent = '';
        regError.textContent = '';
    };

    showLogin.onclick = function(e) {
        e.preventDefault();
        registerBox.classList.add('hidden');
        loginBox.classList.remove('hidden');
        loginError.textContent = '';
        regError.textContent = '';
    };

    registerBtn.onclick = function() {
        var user = regUser.value.trim();
        var pass = regPass.value.trim();
        regError.textContent = '';
        if (!user || !pass) { regError.textContent = 'Fill all fields'; return; }
        if (user.length < 2) { regError.textContent = 'Min 2 chars'; return; }
        if (pass.length < 4) { regError.textContent = 'Min 4 chars'; return; }
        registerUser(user, pass)
            .then(function() {
                regError.textContent = '';
                showToastPopup('✅', 'Account created! Login now.');
                registerBox.classList.add('hidden');
                loginBox.classList.remove('hidden');
                loginUser.value = user;
                loginPass.value = '';
            })
            .catch(function(err) {
                regError.textContent = '❌ ' + err.message;
            });
    };

    loginBtn.onclick = function() {
        var user = loginUser.value.trim();
        var pass = loginPass.value.trim();
        loginError.textContent = '';
        if (!user || !pass) { loginError.textContent = 'Fill all fields'; return; }
        loginUser(user, pass)
            .then(function() {
                setSession(user);
                loginError.textContent = '';
                showToastPopup('👑', 'Welcome Admin!');
                enterChat(user);
            })
            .catch(function(err) {
                loginError.textContent = '❌ ' + err.message;
            });
    };

    loginPass.onkeydown = function(e) { if (e.key === 'Enter') loginBtn.click(); };
    regPass.onkeydown = function(e) { if (e.key === 'Enter') registerBtn.click(); };
    msgInput.onkeydown = function(e) { if (e.key === 'Enter') sendBtn.click(); };

    // ---- Chat ----
    function isAdmin(username) { return username === 'admin'; }

    function getDisplayMessages(all) {
        if (currentDM) {
            return all.filter(function(m) {
                return (m.user === currentUser && m.to === currentDM) ||
                       (m.user === currentDM && m.to === currentUser);
            });
        }
        return all.filter(function(m) {
            return !m.to || m.to === 'public';
        });
    }

    function renderMessages() {
        getMessages().then(function(all) {
            var msgs = getDisplayMessages(all);
            if (msgs.length === 0) {
                messagesDiv.innerHTML = '<div class="msg"><span class="user">System</span><span class="time">now</span><div class="text">' + (currentDM ? 'No messages with ' + currentDM + ' yet.' : 'No public messages yet. Say hello!') + '</div></div>';
                return;
            }
            var html = '';
            for (var i = 0; i < msgs.length; i++) {
                var m = msgs[i];
                var isDM = m.to && m.to !== 'public';
                html += '<div class="msg' + (isDM ? ' dm' : '') + '">';
                html += '<span class="user">' + escapeHtml(m.user) + '</span>';
                html += '<span class="time">' + escapeHtml(m.time) + '</span>';
                html += '<div class="text">' + escapeHtml(m.text) + '</div>';
                html += '</div>';
            }
            messagesDiv.innerHTML = html;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }).catch(function() {});
    }

    function renderMembers() {
        getUsers().then(function(usernames) {
            if (!usernames.includes('admin')) usernames.push('admin');
            usernames.sort(function(a, b) {
                if (a === 'admin') return -1;
                if (b === 'admin') return 1;
                if (a === currentUser) return -1;
                if (b === currentUser) return 1;
                return a.localeCompare(b);
            });
            var html = '';
            var isAdminUser = isAdmin(currentUser);
            var totalUnread = 0;

            // Show clear chat button only for admin
            if (isAdminUser) {
                clearChatBtn.classList.add('show');
            } else {
                clearChatBtn.classList.remove('show');
            }

            for (var i = 0; i < usernames.length; i++) {
                var u = usernames[i];
                var isMe = (u === currentUser);
                var isAdminUser2 = (u === 'admin');
                if (isAdminUser2 && !isAdminUser && !isMe) continue;
                var showAdminControls = isAdminUser && !isAdminUser2 && !isMe;
                html += '<div class="member-item">';
                html += '<span class="name ' + (isMe ? 'me' : '') + (isAdminUser2 ? ' admin' : '') + '">' + (isAdminUser2 ? '👑 ' : '') + escapeHtml(u) + (isMe ? ' (you)' : '') + '</span>';
                html += '<div class="actions">';
                if (!isMe) {
                    html += '<button class="pm" onclick="startDM(\'' + escapeHtml(u) + '\')">💬</button>';
                }
                if (showAdminControls) {
                    html += '<button class="kick" onclick="kickUser(\'' + escapeHtml(u) + '\')">🚫 Kick</button>';
                    html += '<button class="delete" onclick="deleteUser(\'' + escapeHtml(u) + '\')">🗑️ Delete</button>';
                }
                html += '</div></div>';
            }
            memberList.innerHTML = html || '<div style="color:#6a4a8a; font-size:12px;">No users</div>';
        }).catch(function() {});
    }

    // ---- CLEAR CHAT (admin only) ----
    clearChatBtn.onclick = function() {
        if (!isAdmin(currentUser)) {
            showToastPopup('🚫', 'Admin only');
            return;
        }
        if (!confirm('⚠️ Clear ALL chat messages? This cannot be undone.')) return;
        clearChat()
            .then(function() {
                renderMessages();
                renderMembers();
                showToastPopup('🧹', 'Chat cleared by Admin');
            })
            .catch(function(err) {
                showToastPopup('❌', err.message);
            });
    };

    // ---- Admin Controls ----
    window.kickUser = function(username) {
        if (!isAdmin(currentUser)) return;
        if (username === 'admin') { showToastPopup('🚫', 'Cannot kick admin'); return; }
        if (!confirm('Kick ' + username + '? This will clear all their messages.')) return;
        kickUser(username)
            .then(function() {
                renderMessages();
                renderMembers();
                showToastPopup('✅', username + ' kicked (messages cleared)');
            })
            .catch(function(err) {
                showToastPopup('❌', err.message);
            });
    };

    window.deleteUser = function(username) {
        if (!isAdmin(currentUser)) return;
        if (username === 'admin') { showToastPopup('🚫', 'Cannot delete admin'); return; }
        if (!confirm('PERMANENTLY DELETE account: ' + username + '? This cannot be undone.')) return;
        deleteUser(username)
            .then(function() {
                if (currentDM === username) goPublic();
                renderMembers();
                renderMessages();
                showToastPopup('🗑️', 'Account "' + username + '" deleted');
            })
            .catch(function(err) {
                showToastPopup('❌', err.message);
            });
    };

    // ---- DM ----
    window.startDM = function(username) {
        if (username === currentUser) { showToastPopup('🚫', 'Cannot DM yourself'); return; }
        currentDM = username;
        chatTargetLabel.textContent = '💬 DM with ' + username;
        backToPublicBtn.classList.add('show');
        renderMessages();
        renderMembers();
        showToastPopup('💬', 'Private chat with ' + username);
    };

    function goPublic() {
        currentDM = null;
        chatTargetLabel.textContent = '💬 Public chat';
        backToPublicBtn.classList.remove('show');
        renderMessages();
        renderMembers();
        showToastPopup('🌐', 'Back to public chat');
    }

    backToPublicBtn.onclick = goPublic;

    // ---- Send message ----
    function sendMessageHandler() {
        var text = msgInput.value.trim();
        if (!text || !currentUser) return;
        sendMessage(currentUser, text, currentDM)
            .then(function() {
                msgInput.value = '';
                renderMessages();
            })
            .catch(function(err) {
                showToastPopup('❌', err.message);
            });
    }

    sendBtn.onclick = sendMessageHandler;

    // ---- Logout ----
    logoutBtn.onclick = function() {
        if (confirm('Logout?')) {
            clearSession();
            currentUser = '';
            currentDM = null;
            if (messageInterval) clearInterval(messageInterval);
            authBox.style.display = 'block';
            chatDiv.classList.remove('show');
            showToastPopup('👋', 'Logged out');
        }
    };

    // ---- Enter chat ----
    function enterChat(username) {
        currentUser = username;
        currentDM = null;
        chatTargetLabel.textContent = '💬 Public chat';
        backToPublicBtn.classList.remove('show');
        authBox.style.display = 'none';
        chatDiv.classList.add('show');
        chatUserDisplay.textContent = username + (isAdmin(username) ? ' 👑' : '');
        renderMessages();
        renderMembers();
        if (messageInterval) clearInterval(messageInterval);
        messageInterval = setInterval(function() {
            renderMessages();
            renderMembers();
        }, 3000);
    }

    // ---- Session check on load ----
    (function() {
        var session = getSession();
        if (session) {
            showToastPopup('👋', 'Welcome back, ' + session);
            enterChat(session);
            return;
        }
        authBox.style.display = 'block';
        chatDiv.classList.remove('show');
    })();

    console.log('🔥 Sigma Chat ready. Admin: admin / sigma2024');
    console.log('🔔 Click "Enable Notifications" for Chrome alerts.');
    console.log('🧹 Admin can clear the entire chat with the "Clear Chat" button.');
    console.log('✅ Works across all devices!');
    </script>
</body>
</html>
